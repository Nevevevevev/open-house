<!DOCTYPE html>
<html>
<head>
  <title>Open house form</title>
  <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    form>*{margin: 5px;}
    #col1, #col2, #col3, #col4{
      width: calc(100% - 10px);
      box-sizing: border-box;
    }
    #ext{
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container-md">
  <form class="border border-primary border-3">
    <h6>EVERYTHING WITH A * NEXT TO IT IS REQUIRED</h6>
    <label for="col1" class="form-label">NAME: *</label>
    <input type="text" id="col1" placeholder="Name" required class="form-control">
    <label for="col-2" class="form-label">ADDRESS:</label>
    <input type="text" id="col2" placeholder="Address" class="form-control">
    <label for="col-3" class="form-label">CELL NUMBER: *</label>
    <input type="text" id="col3" placeholder="Cell Number" class="form-control" required inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    <label for="col-4" class="form-label"> EMAIL: *</label>
    <input type="email" id="col4" placeholder="Email" class="form-control" required>
    <br>
    <div class="radio-group">
      <div><input class="form-check-input" value="Looking to buy now" type="radio" id="col5a" name="needs" required><label for="col5a" class="form-check-label">Looking to buy now</label></div>
      <div><input class="form-check-input" value="Looking to buy within a year" type="radio" id="col5b" name="needs"><label class="form-check-label" for="col5b">Looking to buy within a year</label></div>
      <div><input class="form-check-input" value="Looking to sell" type="radio" id="col5c" name="needs"><label class="form-check-label" for="col5c">Looking to sell</label></div>
      <div><input class="form-check-input" value="Just shopping around" type="radio" id="col5d" name="needs"><label class="form-check-label" for="col5d">Just shopping around</label></div>
    </div>
    <br>
    <div class="form-check form-switch">
    <input class="form-check-input" type="checkbox" id="col7"><label for="col7" class="form-check-label">Pre-qualified for home loan</label>
    </div>
    <div class="form-check form-switch">
    <input class="form-check-input" type="checkbox" id="col6"><label for="col6" class="form-check-label">Working with real estate agent</label>
    </div>
    <div id="ext">
      <label for="an" class="form-label">AGENT NAME: *</label>
      <input class="form-control" type="text" placeholder="Agent name *" id="an" >
      <label for="ac" class="form-label">AGENT CELL NUMBER: *</label>
      <input class="form-control" type="text" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="Agent Cell Number *" id="ac" ></div>
    <br>
    <div class="d-grid gap-2"><button type="submit" id="sbtn" class="btn btn-primary">SUBMIT</button></div>
  </form>
  </div>
  <p id="response"></p>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwJ2qJ6QBvN2sQaXMAm0ZPapF3mnEOcSJ_QeIwBZbEB_wFb57Kc07quFZ665HkdW0rP/exec";
    $("#col6").change(function() {
      if (this.checked) {
        $("#ext").css("max-height", "200px");
        $("#an").attr("required", true);
        $("#ac").attr("required", true);
      } else {
        $("#ext").css("max-height", "0");
        $("#an").removeAttr("required");
        $("#ac").removeAttr("required");
        $("#ext input").val("");
      }
    });
    function insertRow(event) {
      event.preventDefault();
      $("#sbtn").attr("disabled", true);
      $("#sbtn").val("Submitting...");
      const col1 = encodeURIComponent(document.getElementById("col1").value);
      const col2 = encodeURIComponent(document.getElementById("col2").value || "Prefer not to say");
      const col3 = encodeURIComponent(document.getElementById("col3").value);
      const col4 = encodeURIComponent(document.getElementById("col4").value);
      const col5 = encodeURIComponent($("input[name='needs']:checked").val());
      const col6 = document.getElementById("col6").checked ? "true" : "false";
      const col7 = document.getElementById("col7").checked ? "true" : "false";
      const url = `${API_URL}?col1=${col1}&col2=${col2}&col3=${col3}&col4=${col4}&col5=${col5}&col6=${col6}&col7=${col7}&an=${$("#an").val() || "none"}&ac=${$("#ac").val() || "none"}`;

      fetch(url)
        .then(response => response.text())
        .then(data => {
          alert("Form submitted successfully");
          location.reload();
        })
        .catch(error => {
          alert("There was an error: " + error);
        });
    }
    $("form").submit(insertRow);
  </script>
</body>
</html>
